# Test-only configuration. Real secrets must be supplied via environment vars.
spring.application.name=meetingandclass-test

# In-memory H2 so tests don't need PostgreSQL running.
spring.datasource.url=jdbc:h2:mem:test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# 64-byte deterministic Base64 secret — for tests only, never reuse in prod.
jwt.secret=dGVzdC1zZWNyZXQtZG8tbm90LXVzZS1pbi1wcm9kdWN0aW9uLXRlc3Qtc2VjcmV0LWZvci1qd3Q=
jwt.expiration=3600000

# Don't actually send mail in tests — Spring Boot autoconfigures a no-op when no host is set.
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=
spring.mail.password=
spring.mail.test-connection=false

app.cors.allowed-origins=http://localhost:8080
app.uploads.dir=target/test-uploads
