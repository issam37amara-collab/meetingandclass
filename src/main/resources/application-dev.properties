# ────────────────────────────────────────────────────────────────────────────
#  DEV PROFILE — local development convenience only.
#  Activated with: --spring.profiles.active=dev   (or SPRING_PROFILES_ACTIVE=dev)
#
#  These values are NOT secrets and must NEVER be used in production.
#      In production, leave the default profile and set the real env vars
#      (JWT_SECRET, DB_PASSWORD, MAIL_PASSWORD, ...).
# ────────────────────────────────────────────────────────────────────────────

# ── PostgreSQL (your local DB) ──────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/meeting_db
spring.datasource.username=postgres
spring.datasource.password=123456789

# ── JWT — Base64-encoded 48-byte dev key (DO NOT REUSE IN PRODUCTION) ───────
jwt.secret=ZGV2LW9ubHktZG8tbm90LXVzZS1pbi1wcm9kdWN0aW9uLWp3dC1zZWNyZXQta2V5LWZvci1sb2NhbC1kZXZlbG9wbWVudA==
jwt.expiration=3600000

# ── Email — inherits Gmail credentials from application.properties ──────────
# Do NOT override mail.username/password here — the base config has the
# real Gmail credentials and they must remain active for invitations to work.
# If you want to disable email in dev, uncomment the two lines below:
# spring.mail.username=
# spring.mail.password=

# ── Allow the local browser dev pages ───────────────────────────────────────
app.cors.allowed-origins=http://localhost:8080,http://127.0.0.1:8080,http://localhost:5500

# Show SQL in dev for debugging.
spring.jpa.show-sql=true
