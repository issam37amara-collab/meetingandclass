<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — CUNIV Naama</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a237e, #0d47a1, #01579b)
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 48px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, .3)
    }

    .logo {
      text-align: center;
      margin-bottom: 28px
    }

    .logo h1 {
      color: #1a237e;
      font-size: 22px;
      font-weight: 700
    }

    .logo p {
      color: #666;
      font-size: 13px;
      margin-top: 4px
    }

    label {
      display: block;
      font-size: 13px;
      color: #333;
      margin-bottom: 6px;
      font-weight: 600
    }

    input,
    select {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color .2s;
      margin-bottom: 16px;
      background: #fff
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: #1a237e
    }

    button {
      width: 100%;
      padding: 13px;
      background: #1a237e;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s
    }

    button:hover {
      background: #283593
    }

    .msg {
      margin-top: 16px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      display: none
    }

    .msg.error {
      background: #fce4ec;
      color: #c62828;
      display: block
    }

    .msg.success {
      background: #e8f5e9;
      color: #2e7d32;
      display: block
    }

    .footer {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: #666
    }

    .footer a {
      color: #1a237e;
      text-decoration: none;
      font-weight: 600
    }

    .hint {
      font-size: 11px;
      color: #999;
      margin-top: -12px;
      margin-bottom: 14px
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="logo">
      <h1>🏛 CUNIV Naama</h1>
      <p>Create Your Account</p>
    </div>
    <label>Full Name</label>
    <input type="text" id="fullName" placeholder="Dr. First Last" />
    <label>Institutional Email</label>
    <input type="email" id="email" placeholder="you@cuniv-naama.dz" />
    <p class="hint">Only @cuniv-naama.dz emails are accepted</p>
    <label>Password</label>
    <input type="password" id="password" placeholder="Min 8 characters" />
    <label>Role</label>
    <select id="role">
      <option value="">-- Select your role --</option>
      <option value="DIRECTOR_OF_STUDIES">Director of Studies</option>
      <option value="DIRECTOR_OF_INSTITUTE">Director of Institute</option>
      <option value="HEAD_OF_DEPARTMENT">Head of Department</option>
      <option value="TEACHER">Teacher</option>
    </select>
    <button onclick="signup()">Create Account</button>
    <div class="msg" id="msg"></div>
    <div class="footer">Already registered? <a href="login.html">Sign in</a></div>
  </div>
  <script>
    const API = 'http://localhost:8080';
    async function signup() {
      const fullName = document.getElementById('fullName').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const role = document.getElementById('role').value;
      if (!fullName || !email || !password || !role) { showMsg('Please fill in all fields.', 'error'); return; }
      if (!email.endsWith('@cuniv-naama.dz')) { showMsg('Only @cuniv-naama.dz emails are allowed.', 'error'); return; }
      if (password.length < 8) { showMsg('Password must be at least 8 characters.', 'error'); return; }
      try {
        const res = await fetch(`${API}/api/auth/signup`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ fullName, email, password, role })
        });
        const data = await res.json();
        if (!res.ok) { showMsg(data.message || 'Signup failed.', 'error'); return; }
        showMsg('Account created! Please wait for administrator approval.', 'success');
        setTimeout(() => window.location.href = 'pending-approval.html', 2500);
      } catch (e) { showMsg('Could not connect to server.', 'error'); }
    }
    function showMsg(t, type) { const m = document.getElementById('msg'); m.textContent = t; m.className = `msg ${type}`; }
  </script>
</body>

</html>
