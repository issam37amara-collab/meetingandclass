<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Pending Approval — CUNIV Naama</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #e3f2fd, #bbdefb)
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 48px;
      width: 100%;
      max-width: 460px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0, 0, 0, .15)
    }

    .icon {
      font-size: 64px;
      margin-bottom: 20px
    }

    h2 {
      color: #1a237e;
      font-size: 24px;
      margin-bottom: 12px
    }

    p {
      color: #555;
      line-height: 1.6;
      font-size: 15px
    }

    a {
      display: inline-block;
      margin-top: 28px;
      padding: 12px 28px;
      background: #1a237e;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="icon">⏳</div>
    <h2>Account Pending Approval</h2>
    <p>Your account has been created and is currently under review.<br>
      An administrator will approve it shortly.<br><br>
      You will be able to log in once your account is approved.</p>
    <a href="login.html">Back to Login</a>
  </div>
</body>

</html>
