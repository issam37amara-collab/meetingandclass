<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — CUNIV Naama</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a237e, #0d47a1, #01579b)
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 48px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, .3)
    }

    .logo {
      text-align: center;
      margin-bottom: 32px
    }

    .logo h1 {
      color: #1a237e;
      font-size: 22px;
      font-weight: 700
    }

    .logo p {
      color: #666;
      font-size: 13px;
      margin-top: 4px
    }

    label {
      display: block;
      font-size: 13px;
      color: #333;
      margin-bottom: 6px;
      font-weight: 600
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color .2s;
      margin-bottom: 18px
    }

    input:focus {
      outline: none;
      border-color: #1a237e
    }

    button {
      width: 100%;
      padding: 13px;
      background: #1a237e;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s
    }

    button:hover {
      background: #283593
    }

    .msg {
      margin-top: 16px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      display: none
    }

    .msg.error {
      background: #fce4ec;
      color: #c62828;
      display: block
    }

    .msg.success {
      background: #e8f5e9;
      color: #2e7d32;
      display: block
    }

    .footer {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: #666
    }

    .footer a {
      color: #1a237e;
      text-decoration: none;
      font-weight: 600
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="logo">
      <h1>🏛 CUNIV Naama</h1>
      <p>Meeting & Room Management System</p>
    </div>
    <label>Institutional Email</label>
    <input type="email" id="email" placeholder="you@cuniv-naama.dz" />
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" />
    <button onclick="login()">Sign In</button>
    <div class="msg" id="msg"></div>
    <div class="footer">No account? <a href="signup.html">Sign up</a></div>
  </div>
  <script>
    const API = '';
    const DASHBOARDS = {
      SUPER_ADMIN: 'super-admin-dashboard.html', DIRECTOR_OF_STUDIES: 'dos-dashboard.html',
      DIRECTOR_OF_INSTITUTE: 'director-dashboard.html', HEAD_OF_DEPARTMENT: 'hod-dashboard.html', TEACHER: 'teacher-dashboard.html'
    };

    async function login() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) { showMsg('Please fill in all fields.', 'error'); return; }
      try {
        const res = await fetch(`${API}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) { showMsg(data.message || 'Login failed.', 'error'); return; }
        localStorage.setItem('jwt', data.token);
        localStorage.setItem('role', data.role);
        localStorage.setItem('fullName', data.fullName);
        localStorage.setItem('email', data.email);
        window.location.href = DASHBOARDS[data.role] || 'index.html';
      } catch (e) { showMsg('Could not connect to server.', 'error'); }
    }
    function showMsg(t, type) { const m = document.getElementById('msg'); m.textContent = t; m.className = `msg ${type}`; }
    document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  </script>
</body>

</html>
