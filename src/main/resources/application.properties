spring.application.name=meetingandclass

# ── PostgreSQL ──────────────────────────────────────────────────────────────
# All credentials MUST be supplied via environment variables. The values to the
# right of the colons are *development fallbacks only* — they should NEVER be
# considered secrets, and must be overridden in any non-dev environment.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/meeting_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── JWT ─────────────────────────────────────────────────────────────────────
# Secret MUST be set as an environment variable in production.
# Must be at least 256 bits (32 chars) for HS256.
# Generate one with: openssl rand -base64 48
jwt.secret=${JWT_SECRET}
# 1 hour by default — short-lived tokens reduce blast radius if leaked.
jwt.expiration=${JWT_EXPIRATION:3600000}

# ── Email (Gmail SMTP) ──────────────────────────────────────────────────────
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:465}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# ── File Upload ─────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── App-specific ────────────────────────────────────────────────────────────
# Comma-separated list of origins allowed to call the API (CORS).
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:8080,http://127.0.0.1:8080}

# Brute-force lockout settings for /api/auth/login
app.security.login.max-attempts=${LOGIN_MAX_ATTEMPTS:5}
app.security.login.lock-duration-minutes=${LOGIN_LOCK_MINUTES:15}

# Where uploaded meeting summaries are stored.
app.uploads.dir=${UPLOADS_DIR:uploads}

# Default sender email used by the meeting service.
# IMPORTANT: Gmail SMTP requires 'from' to match the authenticated account.
app.mail.from=${MAIL_FROM:issam37amara@gmail.com}
app.mail.admin=${MAIL_ADMIN:admin@cuniv-naama.dz}

# Hide raw stack traces from error responses.
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never
